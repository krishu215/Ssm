<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Namdev | Web Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora&display=swap" rel="stylesheet">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{
  --black:#0c0c0c;
  --gold:#d4af37;
  --light:#f5f5f5;
}

body{
  margin:0;
  font-family:'Lora', serif;
  background:var(--black);
  color:var(--light);
  overflow-x:hidden;
}

/* Navbar /
nav{
  position:fixed;
  width:100%;
  background:#000;
  padding:15px 10%;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}
nav a{color:white; margin-left:20px; text-decoration:none;}
nav a:hover{color:var(--gold);}

/ Hero /
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.glow-text{
  font-size:60px;
  text-shadow:0 0 20px #d4af37;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #d4af37;}
  to{ text-shadow:0 0 40px #d4af37;}
}

/ Anime /
.anime{
  position:absolute;
  bottom:0;
  right:5%;
  height:350px;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0);}
}

/ Sections /
section{padding:80px 10%;}

.skill, .project{
  background:#151515;
  padding:20px;
  margin:10px 0;
  border-left:3px solid var(--gold);
  transition:0.3s;
}

.skill:hover, .project:hover{
  transform:scale(1.05);
}

/ Button /
.btn{
  padding:12px 25px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  margin-top:20px;
  display:inline-block;
}
.btn:hover{
  background:var(--gold);
  color:black;
}

/ Cursor /
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border:2px solid gold;
  border-radius:50%;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <div>Krishna</div>
  <div>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<section class="hero">
  <div>
    <h1 class="glow-text">Krishna Namdev</h1>
    <p>Web Developer 🚀 | Tech Expert 💻</p>
    <a href="#projects" class="btn">View Work</a>
  </div>

  <!-- Anime Character -->
  <img src="https://i.ibb.co/2q7Q9Yp/anime-boy.png" class="anime">
</section>

<section id="about" data-aos="fade-up">
  <h2>About Me</h2>
  <p>I build modern, fast and business-focused websites.</p>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div class="skill" data-aos="zoom-in">HTML CSS</div>
  <div class="skill" data-aos="zoom-in">Java</div>
  <div class="skill" data-aos="zoom-in">Python</div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="project" data-aos="fade-right">E-commerce Website</div>
  <div class="project" data-aos="fade-left">Portfolio Website</div>
</section>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

/ Cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});
</script>

</body>
</html>
